<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1800" viewBox="0 0 1400 1800"><rect width="1400" height="1800" fill="#F8FAFC"/><rect x="40" y="40" width="1320" height="60" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="700" y="60" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#0F172A">Phase 1: Secure Design &amp; Plan</text><text x="700" y="84" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#0F172A" opacity="0.85">Establish foundational security for cloud-native architecture early.</text><rect x="400" y="40" width="200" height="80" rx="12" fill="#4F46C6" stroke="#3730A3" stroke-width="1.5"/><text x="500" y="70" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Secure Design &amp; IaC</text><text x="500" y="94" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Define infrastructure as code with security by design principles.</text><rect x="760" y="40" width="180" height="100" rx="12" fill="#00897B" stroke="#00695C" stroke-width="1.5"/><text x="850" y="80" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">AI Threat Modeling</text><text x="850" y="104" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Automated threat analysis and mitigation suggestions during design phase.</text><rect x="760" y="180" width="180" height="100" rx="12" fill="#D97706" stroke="#B45309" stroke-width="1.5"/><text x="850" y="220" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">IaC Security Scan</text><text x="850" y="244" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Automated scanning of Infrastructure as Code for misconfigurations and vulnerabilities.</text><rect x="1120" y="40" width="200" height="40" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="1220" y="50" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#0F172A">Shift-Left Principles</text><text x="1220" y="74" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#0F172A" opacity="0.85">Integrating security early reduces costs and risks significantly.</text><rect x="40" y="140" width="1320" height="60" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="700" y="160" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#0F172A">Phase 2: Code &amp; Secure Build</text><text x="700" y="184" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#0F172A" opacity="0.85">Integrate security seamlessly into development and build processes.</text><rect x="400" y="160" width="200" height="80" rx="12" fill="#4F46C6" stroke="#3730A3" stroke-width="1.5"/><text x="500" y="190" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Dev Environment &amp; Code</text><text x="500" y="214" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Developer workstations and code repositories with integrated security tooling.</text><rect x="760" y="320" width="180" height="100" rx="12" fill="#00897B" stroke="#00695C" stroke-width="1.5"/><text x="850" y="360" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">IDE Security Coaching</text><text x="850" y="384" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Real-time security recommendations and vulnerability fixes directly in IDE.</text><rect x="760" y="460" width="180" height="100" rx="12" fill="#D97706" stroke="#B45309" stroke-width="1.5"/><text x="850" y="500" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">SAST/SCA/DAST Scans</text><text x="850" y="524" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Comprehensive static, dynamic, and software composition analysis of code.</text><rect x="400" y="280" width="200" height="80" rx="12" fill="#4F46C6" stroke="#3730A3" stroke-width="1.5"/><text x="500" y="310" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Container Build &amp; Scan</text><text x="500" y="334" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Automated building of secure container images with embedded vulnerability scanning.</text><rect x="760" y="600" width="180" height="100" rx="12" fill="#D97706" stroke="#B45309" stroke-width="1.5"/><text x="850" y="640" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Image Vulnerability Scan</text><text x="850" y="664" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Scanning container images for known vulnerabilities before deployment.</text><rect x="40" y="240" width="1320" height="60" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="700" y="260" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#0F172A">Phase 3: Deploy &amp; Monitor</text><text x="700" y="284" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#0F172A" opacity="0.85">Ensure secure, compliant deployments and continuous runtime protection.</text><rect x="400" y="400" width="200" height="80" rx="12" fill="#4F46C6" stroke="#3730A3" stroke-width="1.5"/><text x="500" y="430" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Secure Deployment Pipeline</text><text x="500" y="454" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Automated deployment to cloud environments with security policy enforcement.</text><rect x="760" y="740" width="180" height="100" rx="12" fill="#D97706" stroke="#B45309" stroke-width="1.5"/><text x="850" y="780" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Cloud Config Guard</text><text x="850" y="804" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Real-time monitoring and enforcement of cloud security configurations.</text><rect x="400" y="520" width="120" height="120" rx="12" fill="#A63A1E" stroke="#7F2D17" stroke-width="1.5"/><text x="460" y="570" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Deployment Approval</text><text x="460" y="594" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Critical change review and authorization by security or operations teams.</text><rect x="400" y="680" width="200" height="80" rx="12" fill="#4F46C6" stroke="#3730A3" stroke-width="1.5"/><text x="500" y="710" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Runtime Protection</text><text x="500" y="734" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Continuous security monitoring and protection of running applications and infrastructure.</text><rect x="760" y="880" width="180" height="100" rx="12" fill="#D97706" stroke="#B45309" stroke-width="1.5"/><text x="850" y="920" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Runtime Threat Detection</text><text x="850" y="944" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">AI-powered detection of anomalous behavior and active threats in runtime.</text><rect x="760" y="1020" width="180" height="100" rx="12" fill="#00897B" stroke="#00695C" stroke-width="1.5"/><text x="850" y="1060" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">AI Incident Response</text><text x="850" y="1084" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Automated remediation and response to detected security incidents.</text><rect x="1120" y="120" width="160" height="90" rx="12" fill="#1E40AF" stroke="#1E3A8A" stroke-width="1.5"/><text x="1200" y="155" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Continuous Compliance Score</text><text x="1200" y="179" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Real-time compliance status against regulatory frameworks and internal policies.</text><rect x="1120" y="250" width="160" height="90" rx="12" fill="#1E40AF" stroke="#1E3A8A" stroke-width="1.5"/><text x="1200" y="285" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Real-time Risk Index</text><text x="1200" y="309" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Aggregated view of current security posture and potential risk exposure.</text><rect x="40" y="340" width="1320" height="60" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="700" y="360" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#0F172A">Phase 4: Feedback &amp; Optimize</text><text x="700" y="384" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#0F172A" opacity="0.85">Iteratively improve security posture based on continuous monitoring and insights.</text><rect x="1120" y="380" width="220" height="100" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/><text x="1230" y="420" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#0F172A">Continuous Improvement Loop</text><text x="1230" y="444" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#0F172A" opacity="0.85">Drive security enhancements back into the design and development phases.</text><rect x="760" y="1160" width="180" height="100" rx="12" fill="#D97706" stroke="#B45309" stroke-width="1.5"/><text x="850" y="1200" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Automated Post-Mortem</text><text x="850" y="1224" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">AI-driven analysis of incidents to identify root causes and preventive actions.</text><rect x="400" y="800" width="200" height="80" rx="12" fill="#4F46C6" stroke="#3730A3" stroke-width="1.5"/><text x="500" y="830" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFFFF">Policy &amp; Rule Updates</text><text x="500" y="854" text-anchor="middle" dominant-baseline="central" font-family="Arial" font-size="11" fill="#FFFFFF" opacity="0.85">Automated update and deployment of security policies and detection rules.</text><defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#64748B"/></marker></defs></svg>